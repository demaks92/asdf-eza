name: Build
on:
  pull_request:
    paths-ignore:
      - "**.md"
  push:
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 0 * * *"

jobs:
  plugin_test_linux:
    name: asdf plugin test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        container: [node:25-trixie]
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
      - uses: asdf-vm/actions/plugin-test@v4
        with:
          command: eza --version

  plugin_test_macos:
    name: asdf plugin test (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: asdf-vm/actions/plugin-test@v4
        with:
          command: eza --version
