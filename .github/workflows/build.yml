name: Build

on:
  pull_request:
    paths-ignore:
      - "**.md"
  push:
    paths-ignore:
      - "**.md"

jobs:
  plugin_test:
    name: ASDF plugin test
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test ASDF plugin (${{ matrix.os }}
        uses: asdf-vm/actions/plugin-test@v4
        with:
          command: eza --version
        env:
          GITHUB_API_TOKEN: ${{ github.token }}
